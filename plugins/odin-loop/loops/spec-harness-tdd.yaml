# =============================================================================
# Odin-Loop · loop definition
# -----------------------------------------------------------------------------
# A loop is DATA, not code. The engine (skills/loop-engine) reads this file and
# executes each stage in order, advancing only when a stage's `gate` passes.
#
# Schema:
#   name            : unique loop id (matches filename)
#   version         : integer, bump on breaking edits
#   description     : one-line summary
#   max_iterations  : global cap on gate failures / loopbacks (happy-path runs are not counted)
#   stages[]        :
#     id            : unique stage id
#     title         : human label
#     goal          : what this stage must achieve (intent)
#     prompt        : instructions the engine follows to execute the stage
#     consumes      : artifacts this stage reads   (hints)
#     produces      : artifacts this stage writes  (hints)
#     agent         : who runs this stage (optional). One of:
#                     inline (default) -> the engine runs the stage itself
#                     fresh            -> a generic clean-room sub-agent (no prior
#                                         conversation context)
#                     a ROLE           -> a reusable persona from <plugin>/agents/:
#                                           explore  read-only scout      (fresh)
#                                           planner  spec -> build plan    (inline)
#                                           executor harness/implement/test (inline)
#                                           critic   adversarial verify     (fresh)
#                                           reviewer clean review + labels  (fresh)
#                     Object form overrides a role's default context:
#                                           agent: { role: executor, fresh: true }
#                     Any stage that resolves to a fresh context needs `consumes`
#                     (its only input channel) and is not biased by this thread.
#     interview     : opt a requirement-gathering stage into the deep-interview
#                     playbook (skills/loop-engine/deep-interview.md). Optional.
#       mode        : deep    -> run the playbook (topology + convergence +
#                               challenges + auto-assist), not just the prompt
#       threshold   : stop when self-scored ambiguity <= this (0..1, default 0.15)
#       challenges  : contrarian-perspective probes, as <kind>@<round>
#                     (default [contrarian@4, simplifier@6, ontologist@8])
#       auto_assist : enable auto-research / auto-answer sub-agents (default true)
#                     A deep interview stays inline and produces interview-log.md.
#     gate          : the advance condition
#       mode        : ai        -> engine judges, auto-advances on pass
#                     ai+human  -> engine judges, then PAUSES for human approval
#                     human     -> today an alias of ai+human (engine judges,
#                                  then pauses for approval); no shipped loop uses it
#       check       : the condition to evaluate (a testable assertion)
#       on_fail     : stage id to jump to when the gate fails
#                     (omit -> retry this same stage)
# =============================================================================

name: spec-harness-tdd
version: 6
description: Clarify requirements -> plan implementation -> design harness -> verify harness -> implement -> test -> clean review
max_iterations: 15

stages:
  # ---------------------------------------------------------------------------
  - id: interview
    title: Deep Interview (Huginn)
    goal: Turn a vague request into a list of observable, testable acceptance criteria
    interview:
      mode: deep
      threshold: 0.15
      challenges: [contrarian@4, simplifier@6, ontologist@8]
      auto_assist: true
    prompt: |
      Interview the user deeply. Most failures come from "intent", not coding,
      so the goal of this stage is an agreed-upon spec.md, not code.

      This stage runs the DEEP-INTERVIEW PLAYBOOK (skills/loop-engine/deep-interview.md): confirm the
      work's topology (1-6 components) in Round 0, then score clarity each round
      and record convergence into interview-log.md until ambiguity <= threshold.
      The playbook owns that procedure (one question at a time, the auto-assist
      sub-agents, and the contrarian/simplifier/ontologist challenges). What
      follows is the DOMAIN FRAMING the playbook wraps.

      Confirm the underlying "goal (why)" before the proposed "solution". Even if
      the user named a solution, push back once to check it actually solves the
      real problem. Park anything the user doesn't know yet under "Open Questions"
      as a risk rather than forcing an answer.

      Dimensions to probe (mark "out of scope" if not applicable). Each feeds one
      of the playbook's scoring buckets — goal / constraints / criteria / context:
      1. Core behavior — what goes in, what must come out          (goal, criteria)
      2. Non-functional — performance / scale / security / compat  (constraints)
      3. Failure/error behavior — bad input, edges, faults         (criteria)
      4. Data/contracts — input/output shapes, external interfaces (criteria)
      5. Dependencies/integration — systems it must work with      (context)
      6. Users/context — who uses it, in what environment          (goal, context)
      7. Success criteria — how "done" is judged objectively       (criteria)
      8. Constraints — stack / deadline / things it must NOT do    (constraints)

      Acceptance-criteria rules
      - Write them "observable and testable". Use Given-When-Then when possible.
      - Bad:  "search must be fast" (not observable, no threshold)
        Good: "keyword search over 100k rows returns results within 200ms"

      spec.md structure (fixed)
        # <task>
        ## Goal (underlying goal)
        ## Topology              # active components (+ deferred, marked out of scope)
        ## Acceptance Criteria   # each item testable, numbered; covers every component
        ## Assumptions
        ## Out of Scope          # explicit non-goals
        ## Edge Cases
        ## Open Questions        # undecided / risks (write "none" if empty)
        ## Convergence           # final scores + ambiguity + ontology stability trace
    produces: [spec.md, interview-log.md]
    gate:
      mode: ai+human
      check: >
        interview-log.md shows run-level ambiguity has fallen to or below the
        configured threshold (0.15); every component confirmed in the Round 0
        topology is covered in spec.md by at least one observable, testable
        acceptance criterion (no well-described component standing in for a vague
        one); and every item under Open Questions is either resolved or explicitly
        accepted as a non-blocking risk (no unresolved blocking risk).

  # ---------------------------------------------------------------------------
  - id: plan
    title: Implementation Planning
    goal: Turn the spec (WHAT) into an ordered implementation plan (HOW) — decompose the topology into build units, sequence them, name file/module targets, flag risks
    agent: planner
    prompt: |
      Turn spec.md into an actionable build plan. This is the HOW, not the WHAT:
      do NOT re-derive or restate the acceptance criteria — that is spec.md's job,
      and duplicating them here just rots. Reference them by number instead.

      Stay inline (you are not a fresh agent): planning wants the interview's
      context and the topology you just confirmed, unlike the clean review which
      wants fresh eyes. Continue that thread.

      Decompose the confirmed Topology into build units. For each unit state:
      - the files / modules it will touch (the real project tree, not harness/)
      - which acceptance criteria it closes (by number)
      - what other units it depends on (so the order is explicit)
      Then give ONE ordered build sequence with no unmet dependency, and a short
      Risks / Unknowns list. If planning exposes a gap or ambiguity in spec.md,
      do not paper over it — record it under Risks / Unknowns and surface it at
      the gate so it can be sent back to the interview.

      plan.md structure (fixed)
        # <task> — Implementation Plan
        ## Build Units        # each: files touched, criteria closed (by #), depends-on
        ## Build Order        # the units in dependency order, with rationale
        ## Risks / Unknowns   # write "none" if empty
    consumes: [spec.md]
    produces: [plan.md]
    gate:
      mode: ai+human
      check: >
        plan.md maps every acceptance criterion in spec.md to at least one build
        unit; the build order has no unmet dependency (nothing depends on a unit
        that comes later); and every build unit is actionable — it names concrete
        file/module targets, not a vague intention.

  # ---------------------------------------------------------------------------
  - id: harness-design
    title: Harness Design
    goal: Translate each acceptance criterion in the spec into an executable test harness
    agent: executor
    prompt: |
      Write an automated test for each criterion in spec.md.
      - There is no implementation (src) yet, so tests are expected to fail.
      - Tests must verify "observable behavior", not implementation details.
      - Keep the criteria <-> test mapping explicit.
      - Use plan.md's build units to organize the harness, but the tests still
        derive from spec.md's criteria — the plan sets order, not what to verify.
    consumes: [spec.md, plan.md]
    produces: [harness/]
    gate:
      mode: ai
      check: >
        Every acceptance criterion in spec.md has at least one corresponding
        test in harness/.

  # ---------------------------------------------------------------------------
  - id: harness-verify
    title: Harness Verification (Gungnir · the spear that never misses)
    goal: Verify the harness itself — does it fail wrong implementations and pass right ones?
    agent: critic
    prompt: |
      Confirm the harness's discriminating power.
      - Create a known-bad stub (a deliberately wrong minimal implementation)
        and run the harness against it.
      - At least one test must fail. If every test passes unconditionally, the
        harness verifies nothing and is defective.
      - Record the result in harness-report.md (which stub, which test failed).
    consumes: [harness/]
    produces: [harness-report.md]
    gate:
      mode: ai
      check: >
        harness-report.md records that at least one test fails against the
        known-bad stub.
      on_fail: harness-design

  # ---------------------------------------------------------------------------
  - id: implement
    title: Implement
    goal: Write the real implementation, targeting the spec and the verified harness
    agent: executor
    prompt: |
      Implement so that spec.md is satisfied and harness/ tests pass.
      - Do not weaken or delete tests to make the harness pass.
      - Do not add features that aren't in the spec (prevent scope creep).
      - If you arrived here from a review finding, first add a regression test to
        harness/ that captures it, then make it pass.
      - Follow plan.md's build order; deviate only with a stated reason.
    consumes: [spec.md, plan.md, harness/]
    produces: [src/]
    gate:
      mode: ai
      check: The project passes lint / type-check / build.

  # ---------------------------------------------------------------------------
  - id: test
    title: Test with Harness
    goal: Final verification of the implementation with the verified harness
    agent: executor
    prompt: |
      Run all tests in harness/ and report the results.
      On failure, go back to implement and fix it (fix the implementation,
      not the test).
    consumes: [src/, harness/]
    gate:
      mode: ai
      check: All tests in harness/ pass.
      on_fail: implement

  # ---------------------------------------------------------------------------
  - id: review
    title: Clean Review (fresh agent)
    goal: Have an uncontaminated agent review the implementation against the spec
    agent: reviewer
    prompt: |
      Review the finished implementation with fresh eyes. This stage runs in a
      FRESH sub-agent that has NOT seen the implementation conversation, so its
      judgment is not anchored to the implementer's reasoning.

      The reviewer receives only spec.md, the implementation (src/), harness/,
      and harness-report.md (what the harness already discriminates). Nothing
      from the prior thread.

      Look for what the harness does NOT catch:
      - correctness on paths the tests miss, and edge cases listed in spec.md
      - security / unsafe assumptions / resource handling
      - scope creep: a *user-facing* behavior not traceable to an acceptance
        criterion (internal helpers, validation, error handling, logging are
        NOT scope creep)
      - spec gaps the harness silently ignores

      Classify every finding by this fixed rule:
        BLOCKING     = it (a) violates an Acceptance Criterion in spec.md, or
                       (b) breaks on an Edge Case listed in spec.md, or
                       (c) is a security or data-loss defect.
        NON-BLOCKING = everything else (style, preference, "could be better").
      Respect spec.md's "Out of Scope" and "Assumptions" — those are deliberate
      user decisions; never raise them as blocking, record them as non-blocking
      scope notes at most.

      Record every finding in review-report.md with file:line, its blocking /
      non-blocking label, and a one-line rationale; state explicitly whether any
      blocking findings remain. You assign the labels. Do NOT edit code here — a
      blocking finding loops back to implement, where the fix should add a
      regression test that captures it.
    consumes: [spec.md, src/, harness/, harness-report.md]
    produces: [review-report.md]
    gate:
      mode: ai+human
      check: >
        review-report.md exists and records zero BLOCKING findings — where
        blocking means a violation of a spec.md acceptance criterion or listed
        edge case, or a security/data-loss defect.
      on_fail: implement
